<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="main">
    
    <div class="left-div"></div>
    <div class="right-div"></div>

    <div class="menu-icon">
      <i class="ri-menu-line"></i>
    </div>

    <div class="content">
      <span class="sub-title">POKÉMON GEN I</span>
      <h1 class="main-title">Pikachu</h1>
      <p class="description">
        Pikachu is an Electric-type Pokémon introduced in Generation I. Pikachu are small, chubby, and incredibly cute mouse-like Pokémon. They are almost completely covered by yellow fur.
      </p>
      <div class="pagination-number">01 / 08</div>
    </div>

    <div class="watermark"></div>

    <div class="character-img">
      <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/025.png" alt="Pikachu">
    </div>

    <div class="dots-navigation">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

  </div>

</body>
</html>
