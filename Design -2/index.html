<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Work</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <main class="dashboard">
        <div class="dot dot-tl"></div>
        <div class="dot dot-bl"></div>
        <div class="dot dot-tr"></div>
        <div class="dot dot-br"></div>

        <header class="section-header">
            <h2>Explore Art Work</h2>
            <a href="#" class="see-all">See All</a>
        </header>

        <section class="grid-container">
            <div class="nft-card">

                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop" alt="Monocular">
                </div>
                <div class="card-info">
                    <span class="title">Monocular</span>
                    <span class="likes">54.8k <i class="ri-heart-line"></i></span>
                </div>
                <button class="bid-btn">Place Bid</button>
            </div>

            <div class="nft-card">

            <div class="nft-card">

            <div class="nft-card">

                </div>

            <div class="nft-card">
